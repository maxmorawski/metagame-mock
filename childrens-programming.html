<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Children's Programming — Metagame 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1b1b1b;
  --navy:#173059ff;
  --navy2:#1f3352;
  --blue:#4d9ff7;
  --tan:#e2a85c;
  --cream:#fff5f2ff;
  --meeple:#d8502b;
  --meeple-dark:#b8431f;
  --felt:#3b7a3e;
  --line:rgba(27,27,27,0.12);
  --line-dark:rgba(246,239,227,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  color:var(--ink);
  background:var(--cream);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3{font-family:'Space Grotesk',sans-serif;font-weight:700;line-height:1.05;letter-spacing:-0.01em;}
.mono{font-family:'Space Mono',monospace;}
a{color:inherit;text-decoration:none;}
img{max-width:100%;display:block;}
.wrap{max-width:1180px;margin:0 auto;padding:0 32px;}
.eyebrow{
  font-family:'Space Mono',monospace;
  font-size:20px;
  letter-spacing:0.12em;
  text-transform:uppercase;
}

/* dice symbol defs */
.die-defs{position:absolute;width:0;height:0;overflow:hidden;}

.die{width:34px;height:34px;flex:none;}

.btn{
  display:inline-flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;font-weight:600;font-size:15px;
  padding:12px 22px;border-radius:8px;border:1.5px solid transparent;
  cursor:pointer;transition:transform .15s ease, background .15s ease, border-color .15s ease;
  white-space:nowrap;
}
.btn:hover{transform:translateY(-1px);}
.btn-primary{background:var(--meeple);color:#fff;}
.btn-primary:hover{background:var(--meeple-dark);}
.btn-ghost{border-color:rgba(246,239,227,0.55);color:var(--cream);}
.btn-ghost:hover{border-color:var(--cream);background:rgba(246,239,227,0.08);}
.btn-sm{padding:9px 16px;font-size:14px;}
/* section heading */
.section{padding:88px 0;}
#whats-on{padding-top:44px;}
.section-head{max-width:600px;margin-bottom:48px;}
.section-head .eyebrow{color:var(--meeple);margin-bottom:10px;}
.section-head h2{font-size:clamp(28px,4vw,40px);}
.section-head p{margin-top:14px;color:rgba(27,27,27,0.68);font-size:16px;}

/* cards - whats on */
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.card{
  background:var(--navy);color:var(--cream);
  border-radius:14px;padding:26px 22px 24px;
  position:relative;overflow:hidden;
  border:1px solid var(--line-dark);
  transition:transform .18s ease, border-color .18s ease;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  min-height:245px;
}
.card:hover{transform:translateY(-4px);border-color:var(--blue);}
.card .chess-icon{
  position:absolute;top:16px;right:18px;
  width:42px;height:42px;object-fit:contain;
}
.card h3{font-size:19px;margin:0 0 10px;padding-right:54px;}
.card p{font-size:14.5px;color:rgba(246,239,227,0.7);margin-bottom:20px;}
.card .go{font-size:13.5px;font-weight:600;color:#edb067;display:inline-flex;align-items:center;gap:6px;margin-top:auto;}

/* divider */
.pip-divider{
  display:flex;align-items:center;justify-content:center;gap:22px;
  padding:6px 0 92px;
}
.pip-divider .line{height:1px;background:var(--line);flex:1;max-width:160px;}
.pip-divider .divider-icon{width:30px;height:30px;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(27,27,27,0.12));}

/* about + gallery */
.about{display:grid;grid-template-columns:1.1fr 0.9fr;gap:64px;align-items:center;}
.about h2{font-size:clamp(26px,3.6vw,36px);margin-bottom:18px;}
.about p{color:rgba(27,27,27,0.72);margin-bottom:16px;font-size:16px;max-width:480px;}
.about-list{margin-top:22px;display:flex;flex-direction:column;gap:12px;}
.about-list li{list-style:none;display:flex;gap:10px;align-items:flex-start;font-size:15px;}
.about-list .dot{width:8px;height:8px;border-radius:50%;background:var(--felt);margin-top:7px;flex:none;}
.about-photo{
  border:8px solid #fff;border-radius:4px;
  box-shadow:0 18px 40px rgba(27,27,27,0.18);
  transform:rotate(-2deg);
  overflow:hidden;
}
.about-photo img{border-radius:1px;}

/* testimonials */
.testi-wrap{
  background:#cee1ff;
  border-top:1px solid rgba(23,48,89,0.12);
  border-bottom:1px solid rgba(23,48,89,0.12);
}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.testi-card{
  background:var(--cream);border-radius:14px;padding:26px 24px;
  border:1px solid rgba(23,48,89,0.16);
  box-shadow:0 8px 24px rgba(23,48,89,0.08);
}
.testi-card p{color:rgba(27,27,27,0.78);font-size:15px;margin-bottom:18px;}
.testi-name{font-size:14px;color:var(--meeple);font-weight:600;}
.testi-role{font-size:13px;color:rgba(27,27,27,0.55);}
.testi-wrap .section-head h2{color:var(--navy);}
.testi-wrap .eyebrow{color:var(--meeple);}
.testi-wrap .section-head p{color:rgba(27,27,27,0.65);}

/* sponsors */
.sponsor-row{
  display:flex;flex-wrap:wrap;gap:14px 40px;align-items:center;justify-content:space-between;
  padding-top:8px;
}
.sponsor-row span{
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;
  color:rgba(27,27,27,0.38);letter-spacing:-0.01em;
}

/* signup banner */
.signup{
  background:var(--navy2);color:var(--cream);
  padding:72px 32px;text-align:center;
}
.signup h2{font-size:clamp(26px,4vw,38px);margin-bottom:14px;}
.signup p{color:rgba(246,239,227,0.72);margin-bottom:30px;}
.signup-form{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;max-width:460px;margin:0 auto;}
.signup-form input{
  flex:1;min-width:220px;padding:13px 16px;border-radius:8px;border:1.5px solid rgba(246,239,227,0.3);
  background:rgba(246,239,227,0.06);color:var(--cream);font-family:'Inter',sans-serif;font-size:15px;
}
.signup-form input::placeholder{color:rgba(246,239,227,0.45);}
.signup-form input:focus{outline:none;border-color:var(--blue);}
.signup-note{margin-top:14px;font-size:13px;color:rgba(246,239,227,0.5);}

@media (max-width:900px){
  .card-grid{grid-template-columns:repeat(2,1fr);}
  .about{grid-template-columns:1fr;gap:36px;}
  .about-photo{max-width:360px;}
  .testi-grid{grid-template-columns:1fr;}
}
@media (max-width:560px){
  .card-grid{grid-template-columns:1fr;}
}




/* Prevent below-the-fold layouts from widening the page and changing apparent header scale */
html{
  scrollbar-gutter:stable;
  max-width:100%;
  overflow-x:hidden;
}
body{
  max-width:100%;
  overflow-x:hidden;
}
@supports (overflow:clip){
  html,body{overflow-x:clip;}
}
.card-grid,
.about,
.testi-grid,
.foot-grid{
  min-width:0;
}
.card,
.about > *,
.testi-card,
.foot-grid > *{
  min-width:0;
}


/* children's programming page */
.children-intro{padding:72px 0 54px;}
.children-intro-grid{
  display:grid;
  grid-template-columns:minmax(0,1.15fr) minmax(300px,.85fr);
  gap:64px;
  align-items:center;
}
.children-intro .eyebrow{color:var(--meeple);margin-bottom:12px;}
.children-intro h1{
  font-size:clamp(36px,5vw,58px);
  color:var(--navy);
  margin-bottom:22px;
}
.children-intro p{
  max-width:680px;
  color:rgba(27,27,27,.72);
  font-size:17px;
  margin-bottom:16px;
}
.children-illustration{
  position:relative;
  min-height:330px;
  border-radius:24px;
  overflow:hidden;
  background:
    radial-gradient(circle at 28% 34%, rgba(255,255,255,.85) 0 5%, transparent 5.5%),
    radial-gradient(circle at 73% 63%, rgba(255,255,255,.65) 0 4%, transparent 4.5%),
    linear-gradient(145deg,#cee1ff 0%,#f8d8bd 100%);
  border:1px solid rgba(23,48,89,.14);
  box-shadow:0 18px 42px rgba(23,48,89,.12);
}
.children-illustration::before,
.children-illustration::after{
  content:"";
  position:absolute;
  border:3px solid var(--navy);
  opacity:.9;
}
.children-illustration::before{
  width:150px;height:150px;border-radius:24px;
  left:54px;top:52px;transform:rotate(-10deg);
  background:rgba(255,245,242,.78);
  box-shadow:18px 18px 0 rgba(216,80,43,.18);
}
.children-illustration::after{
  width:118px;height:118px;border-radius:50%;
  right:48px;bottom:50px;
  background:rgba(255,245,242,.74);
  box-shadow:-14px 14px 0 rgba(59,122,62,.18);
}
.play-piece{
  position:absolute;
  z-index:2;
  display:grid;
  place-items:center;
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  color:var(--navy);
  background:var(--cream);
  border:2px solid var(--navy);
  box-shadow:0 8px 0 rgba(23,48,89,.14);
}
.play-piece.one{width:70px;height:70px;border-radius:14px;left:92px;top:93px;font-size:30px;transform:rotate(7deg);}
.play-piece.two{width:64px;height:64px;border-radius:50%;right:76px;bottom:78px;font-size:25px;}
.play-piece.three{width:56px;height:56px;border-radius:12px;right:94px;top:78px;font-size:24px;transform:rotate(-8deg);}

.quick-facts{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:16px;
  margin-top:48px;
}
.fact{
  background:#fff;
  border:1px solid rgba(23,48,89,.14);
  border-radius:14px;
  padding:20px;
  min-width:0;
}
.fact strong{
  display:block;
  font-family:'Space Grotesk',sans-serif;
  color:var(--navy);
  font-size:18px;
  margin-bottom:5px;
}
.fact span{font-size:14px;color:rgba(27,27,27,.62);}

.program-section{
  background:#cee1ff;
  border-top:1px solid rgba(23,48,89,.12);
  border-bottom:1px solid rgba(23,48,89,.12);
}
.program-section .section-head{max-width:720px;}
.program-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:20px;
}
.program-card{
  min-height:230px;
  padding:25px 23px 22px;
  background:var(--cream);
  border:1px solid rgba(23,48,89,.16);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  box-shadow:0 8px 22px rgba(23,48,89,.07);
  min-width:0;
}
.program-icon{
  width:48px;height:48px;
  border-radius:13px;
  display:grid;
  place-items:center;
  margin-bottom:20px;
  font-family:'Space Mono',monospace;
  font-weight:700;
  font-size:20px;
  color:var(--cream);
  background:var(--navy);
}
.program-card:nth-child(2n) .program-icon{background:var(--meeple);}
.program-card:nth-child(3n) .program-icon{background:var(--felt);}
.program-card h3{font-size:21px;color:var(--navy);margin-bottom:10px;}
.program-card p{font-size:14.5px;color:rgba(27,27,27,.7);margin-bottom:18px;}
.program-tag{
  margin-top:auto;
  font-family:'Space Mono',monospace;
  font-size:11px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--meeple);
}

.family-details{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(300px,.8fr);
  gap:54px;
  align-items:start;
}
.family-details h2{font-size:clamp(30px,4vw,42px);color:var(--navy);margin-bottom:18px;}
.family-details > div > p{color:rgba(27,27,27,.7);margin-bottom:18px;max-width:650px;}
.detail-list{display:grid;gap:14px;margin-top:26px;}
.detail-item{
  display:grid;
  grid-template-columns:34px minmax(0,1fr);
  gap:13px;
  align-items:start;
}
.detail-marker{
  width:30px;height:30px;border-radius:50%;
  display:grid;place-items:center;
  background:var(--felt);color:#fff;
  font-family:'Space Mono',monospace;font-size:13px;font-weight:700;
}
.detail-item h3{font-size:17px;color:var(--navy);margin:1px 0 4px;}
.detail-item p{font-size:14px;color:rgba(27,27,27,.66);}
.info-panel{
  background:var(--navy);
  color:var(--cream);
  border-radius:18px;
  padding:30px;
  border:1px solid var(--line-dark);
}
.info-panel .eyebrow{color:var(--tan);font-size:14px;margin-bottom:10px;}
.info-panel h3{font-size:28px;margin-bottom:14px;}
.info-panel p{font-size:15px;color:rgba(246,239,227,.73);margin-bottom:22px;}
.info-panel .btn{width:100%;}
.schedule-note{
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid var(--line-dark);
  font-family:'Space Mono',monospace;
  font-size:12px;
  color:rgba(246,239,227,.58);
}

.children-cta{
  background:var(--navy2);
  color:var(--cream);
  padding:70px 32px;
  text-align:center;
}
.children-cta h2{font-size:clamp(28px,4vw,40px);margin-bottom:14px;}
.children-cta p{max-width:610px;margin:0 auto 28px;color:rgba(246,239,227,.72);}
.children-cta-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}

@media (max-width:900px){
  .children-intro-grid,
  .family-details{grid-template-columns:1fr;gap:38px;}
  .children-illustration{max-width:560px;width:100%;}
  .quick-facts{grid-template-columns:repeat(2,minmax(0,1fr));}
  .program-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
}
@media (max-width:560px){
  .children-intro{padding-top:52px;}
  .children-intro h1{font-size:36px;}
  .quick-facts,
  .program-grid{grid-template-columns:1fr;}
  .children-illustration{min-height:260px;}
  .children-illustration::before{left:30px;top:38px;}
  .children-illustration::after{right:28px;bottom:32px;}
  .play-piece.one{left:65px;top:78px;}
  .play-piece.two{right:55px;bottom:60px;}
  .play-piece.three{right:65px;top:54px;}
  .children-cta-actions .btn{width:100%;}
}

</style>
</head>

      <p class="eyebrow">Children's Programming</p>

<script>
async function loadSiteHeader(){
  const mount = document.getElementById('site-header');

  try{
    const headerRequestUrl = new URL('./header.html', window.location.href);
    const response = await fetch(headerRequestUrl);
    if(!response.ok) throw new Error(`Header request failed: ${response.status}`);
    const headerUrl = new URL(response.url || headerRequestUrl.href);

    const template = document.createElement('template');
    template.innerHTML = (await response.text()).trim();
    const fragment = template.content;
    const header = fragment.querySelector('.nav');

    if(!header) throw new Error('The shared header file does not contain the navigation.');

    const currentPage = window.location.pathname.split('/').pop() || 'index.html';
    header.querySelectorAll('.nav-links a[href]').forEach(function(link){
      const href = link.getAttribute('href');

      if(href === currentPage){
        link.classList.add('current');
        link.setAttribute('aria-current', 'page');
      }

      if(href && !href.startsWith('#') && !/^[a-z][a-z0-9+.-]*:/i.test(href)){
        link.href = new URL(href, headerUrl).href;
      }
    });

    fragment.querySelectorAll('img[src]').forEach(function(image){
      const src = image.getAttribute('src');

      if(src && !src.startsWith('/') && !/^[a-z][a-z0-9+.-]*:/i.test(src)){
        image.src = new URL(src, headerUrl).href;
      }
    });

    const sharedHeroMedia = fragment.querySelector('.hero-media');
    if(sharedHeroMedia){
      const heroImageUrl = new URL('./images/hero.png', headerUrl).href;
      sharedHeroMedia.style.backgroundImage = `url("${heroImageUrl}")`;
    }

    const hamburger = header.querySelector('.hamburger');
    const links = header.querySelector('.nav-links');

    mount.replaceWith(fragment);

    if(hamburger && links){
      hamburger.addEventListener('click', function(){
        const open = links.classList.toggle('is-open');
        hamburger.setAttribute('aria-expanded', String(open));
      });

      window.addEventListener('resize', function(){
        if(window.matchMedia('(min-width:1181px)').matches){
          links.classList.remove('is-open');
          hamburger.setAttribute('aria-expanded', 'false');
        }
      });
    }
  }catch(error){
    console.error('Unable to load the shared site header.', error);
  }
}

loadSiteHeader();
</script>
