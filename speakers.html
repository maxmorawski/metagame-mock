<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Speakers — Metagame 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#173059;--blue:#4d9ff7;--tan:#e2a85c;--cream:#fff5f2;--meeple:#d8502b;--meeple-dark:#b8431f;--line-dark:rgba(246,239,227,.14);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;background:var(--cream);color:#1b1b1b;font-family:"Inter",Arial,sans-serif;}
    #site-header{min-height:553px;}
    .holding-page{min-height:420px;display:grid;place-items:center;padding:64px 32px 88px;}
    .holding-card{
      width:min(100%,720px);padding:clamp(40px,7vw,72px);text-align:center;
      background:#cee1ff;border:1px solid rgba(23,48,89,.16);border-radius:16px;
      box-shadow:0 12px 32px rgba(23,48,89,.1);
    }
    .holding-card .eyebrow{margin-bottom:12px;font-family:"Space Mono",monospace;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--meeple);}
    .holding-card h1{margin-bottom:18px;font-family:"Space Grotesk",sans-serif;font-size:clamp(32px,5vw,52px);line-height:1.05;color:var(--navy);}
    .holding-card p:not(.eyebrow){max-width:540px;margin:0 auto 28px;font-size:17px;line-height:1.6;color:rgba(23,48,89,.76);}
    .archive-button{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;
      border-radius:8px;background:var(--navy);color:#fff;text-decoration:none;font-weight:600;
      transition:transform .15s ease,background .15s ease;
    }
    .archive-button:hover{transform:translateY(-1px);background:#1f3352;}
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="holding-page">
    <section class="holding-card" aria-labelledby="page-title">
      <p class="eyebrow">Metagame 2026</p>
      <h1 id="page-title">Speakers in progress</h1>
      <p>We're still confirming this year's lineup. In the meantime, meet the designers, creators, and other fascinating people who spoke last year.</p>
      <a class="archive-button" href="https://2025.metagame.games/#speakers" target="_blank" rel="noopener">See last year's speakers <span aria-hidden="true">↗</span></a>
    </section>
  </main>

  <div id="site-footer"></div>

  <script>
    async function loadSiteHeader(){
      const mount = document.getElementById("site-header");

      try{
        const requestUrl = new URL("./header.html", window.location.href);
        const response = await fetch(requestUrl);
        if(!response.ok) throw new Error(`Header request failed: ${response.status}`);
        const headerUrl = new URL(response.url || requestUrl.href);

        const template = document.createElement("template");
        template.innerHTML = (await response.text()).trim();
        const fragment = template.content;
        const siteHeader = fragment.querySelector(".site-header");
        if(!siteHeader) throw new Error("header.html does not contain .site-header");

        const currentPage = window.location.pathname.split("/").pop() || "index.html";
        fragment.querySelectorAll("a[href]").forEach(function(link){
          const href = link.getAttribute("href");
          if(href === currentPage){
            link.classList.add("current");
            link.setAttribute("aria-current", "page");
          }
          if(href && !href.startsWith("#") && !/^[a-z][a-z0-9+.-]*:/i.test(href)){
            link.href = new URL(href, headerUrl).href;
          }
        });

        fragment.querySelectorAll("img[src]").forEach(function(image){
          const src = image.getAttribute("src");
          if(src && !src.startsWith("/") && !/^[a-z][a-z0-9+.-]*:/i.test(src)){
            image.src = new URL(src, headerUrl).href;
          }
        });

        const heroMedia = fragment.querySelector(".hero-media");
        if(heroMedia){
          heroMedia.style.backgroundImage = `url("${new URL("./images/hero.png", headerUrl).href}")`;
        }

        const hamburger = fragment.querySelector(".hamburger");
        const links = fragment.querySelector(".nav-links");
        mount.replaceWith(fragment);

        if(hamburger && links){
          hamburger.addEventListener("click", function(){
            const open = links.classList.toggle("is-open");
            hamburger.setAttribute("aria-expanded", String(open));
          });
          window.addEventListener("resize", function(){
            if(window.matchMedia("(min-width:1181px)").matches){
              links.classList.remove("is-open");
              hamburger.setAttribute("aria-expanded", "false");
            }
          });
        }
      }catch(error){
        console.error("Unable to load the shared site header.", error);
      }
    }

    loadSiteHeader();
  </script>
  <script src="./footer-loader.js" defer></script>
</body>
</html>
