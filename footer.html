<style>
.site-footer{
  background:var(--navy, #173059);
  color:rgba(246,239,227,0.74);
  padding:46px 0 26px;
  font-family:'Inter',sans-serif;
  line-height:1.55;
}
.site-footer *{box-sizing:border-box;}
.site-footer a{text-decoration:none;}
.site-footer .footer-wrap{max-width:1180px;margin:0 auto;padding:0 32px;}

.site-footer .footer-top{
  display:flex;
  align-items:center;

  gap:32px;
  padding-bottom:30px;
  border-bottom:1px solid var(--line-dark, rgba(246,239,227,0.14));
}
.site-footer .footer-logo{display:inline-block;}
.site-footer .footer-logo img{display:block;width:150px;height:auto;}
.site-footer .footer-event{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:12px;
  font-family:'Space Mono',monospace;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--tan, #e2a85c);
}
.site-footer .footer-event-dot{

  border-radius:50%;
  background:var(--blue, #4d9ff7);
}

.site-footer .footer-columns{
  display:grid;
  grid-template-columns:1fr 1fr 1.2fr;
  padding:36px 0 38px;
}
.site-footer .footer-column{
  min-width:0;
  padding:0 clamp(24px, 4vw, 52px);
}
.site-footer .footer-column:first-child{padding-left:0;}
.site-footer .footer-column:last-child{padding-right:0;}
.site-footer .footer-column + .footer-column{

}
.site-footer .footer-heading{

  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--tan, #e2a85c);
}
.site-footer .footer-links{display:grid;gap:10px;}
.site-footer .footer-link{
  display:flex;
  align-items:center;
  gap:9px;
  width:fit-content;
  color:rgba(246,239,227,0.78);
  font-size:14.5px;
  transition:color .15s ease,transform .15s ease;
}
.site-footer .footer-link::before{
  content:'→';
  color:var(--blue, #4d9ff7);
  font-size:12px;
  transition:transform .15s ease;
}
.site-footer .footer-link:hover,
.site-footer .footer-link.current{color:var(--cream, #fff5f2);}
.site-footer .footer-link:hover{transform:translateX(2px);}
.site-footer .footer-link:hover::before{transform:translateX(2px);}
.site-footer .footer-link.night-market-link{color:#FA8072;}

.site-footer .footer-email{
  display:inline-block;
  margin-bottom:17px;
  color:var(--cream, #fff5f2);
  font-size:15px;
  font-weight:600;
}
.site-footer .footer-email:hover{color:var(--tan, #e2a85c);}
.site-footer .footer-address{
  margin:0;
  font-style:normal;
  font-size:14px;
  line-height:1.65;
  color:rgba(246,239,227,0.68);
}
.site-footer .footer-address strong{
  color:rgba(246,239,227,0.9);
  font-weight:600;
}

.site-footer .footer-bottom{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding-top:22px;
  border-top:1px solid var(--line-dark, rgba(246,239,227,0.14));
  font-size:12.5px;
  color:rgba(246,239,227,0.5);
}

@media (max-width:760px){
  .site-footer .footer-wrap{padding:0 24px;}
  .site-footer .footer-top{align-items:flex-start;flex-direction:column;gap:18px;}
  .site-footer .footer-event{justify-content:flex-start;flex-wrap:wrap;}
  .site-footer .footer-columns{grid-template-columns:1fr 1fr;gap:30px 36px;}
  .site-footer .footer-column{padding:0;border-left:0 !important;}
  .site-footer .footer-column:last-child{
    grid-column:1 / -1;
    padding-top:28px;
    border-top:1px solid var(--line-dark, rgba(246,239,227,0.14));
  }
}
@media (max-width:500px){
  .site-footer{padding-top:38px;}
  .site-footer .footer-columns{grid-template-columns:1fr;gap:0;}
  .site-footer .footer-column,
  .site-footer .footer-column:last-child{
    grid-column:auto;
    padding:24px 0;
    border-top:1px solid var(--line-dark, rgba(246,239,227,0.14));
  }
  .site-footer .footer-column:first-child{border-top:0;}
  .site-footer .footer-event-dot{display:none;}
  .site-footer .footer-event span{width:100%;}
}
